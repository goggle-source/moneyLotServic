
services:
  
  dbmoney:
    image: postgres:18

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alice -d moneyDB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    
    command: >
      postgres
      -c listen_addresses='*'
      -c port=5432
      -c max_connections=100
      -c shared_buffers=256MB

    environment:
      - POSTGRES_USER=alice
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=moneyDB
    
    ports:
      - "5433:5432"
    
    networks:
      - shared-network
    
  
  moneyserver:

    build: .

    ports:
      - "54322:54321"
    
    networks:
      - shared-network
    
    depends_on:
      dbmoney:
        condition: service_healthy

networks:
  
  shared-network:
    external: true
    name: shared-network